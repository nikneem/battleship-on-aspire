<div class="overlay-backdrop">
  <div class="overlay-card tactical-panel">
    <p class="eyebrow">⚠ CONNECTION ALERT</p>
    <h2 class="overlay-title">OPPONENT LOST CONNECTION</h2>
    <p class="overlay-desc">
      The opposing commander's signal has been lost. Attempting to re-establish contact.
      If the connection is not restored within the countdown, you will be returned to the command deck.
    </p>
    <div class="countdown">
      <span class="countdown__value">{{ secondsRemaining() }}</span>
      <span class="countdown__label">SECONDS REMAINING</span>
    </div>
  </div>
</div>

<article class="tactical-panel mission-panel" id="mission" aria-labelledby="mission-title">
  <div class="panel-heading">
    <p class="panel-kicker">GAME BRIEF</p>
    <h2 id="mission-title">READY TO PLAY?</h2>
  </div>

  <p class="mission-copy">
    Battleship on Aspire lets you step straight from the landing page into a playable Battleship experience with a live
    board, fleet placement, and turn-by-turn naval combat.
  </p>

  <div class="mission-grid">
    @for (highlight of missionHighlights(); track highlight) {
      <div class="mission-card">
        <span>OBJECTIVE</span>
        <p>{{ highlight }}</p>
      </div>
    }
  </div>
</article>

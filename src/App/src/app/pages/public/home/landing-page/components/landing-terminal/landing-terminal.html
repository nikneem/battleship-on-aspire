<article class="tactical-panel terminal-panel" id="terminal" aria-labelledby="terminal-title">
  <div class="panel-heading">
    <p class="panel-kicker">ACTIVE CONTACTS</p>
    <h2 id="terminal-title">TACTICAL TERMINAL</h2>
  </div>

  <div class="terminal-feed" role="log" aria-live="polite">
    <p class="typed-line">{{ typedLine() }}<span class="terminal-cursor" aria-hidden="true"></span></p>

    @for (line of historyLines(); track line) {
      <p>{{ line }}</p>
    }
  </div>

  <form class="terminal-input" (submit)="$event.preventDefault(); submitVisitorMessage()">
    <label class="terminal-input__label" for="terminal-command">VISITOR INPUT</label>
    <div class="terminal-input__row">
      <span aria-hidden="true">&gt;</span>
      <input
        id="terminal-command"
        type="text"
        [value]="visitorInput()"
        (input)="updateVisitorInput($event)"
        placeholder="Type a command"
        autocomplete="off"
      />
      <button type="submit">SEND</button>
    </div>
  </form>
</article>

<section class="hero-panel hero-panel--jumbo tactical-panel" aria-labelledby="landing-page-title">
  <div class="hero-copy">
    <p class="eyebrow">SUBMERGED COMMAND STATION</p>
    <h1 id="landing-page-title">BATTLE OPS // BELOW THE SURFACE</h1>
    <p class="deck">
      Enter the command deck, launch a live Battleship game, deploy your fleet, and follow every sonar ping as the
      match unfolds.
    </p>

    <div class="hero-actions" aria-label="Landing page actions">
      <a class="command-link" routerLink="/create-game">PLAY BATTLESHIP</a>
      <a class="command-link command-link--secondary" routerLink="/games/join">JOIN GAME</a>
    </div>

    <p class="status-note">{{ audioInstruction() }}</p>
  </div>

  <bat-landing-terminal class="hero-terminal" [lines]="terminalFeed()" />

  <div class="hero-instrumentation">
    <div class="gauge-strip" aria-label="Animated status meters">
      @for (gauge of gaugeReadouts(); track gauge.label) {
        <bat-landing-vu-meter [label]="gauge.label" [status]="gauge.status" [value]="gauge.value"></bat-landing-vu-meter>
      }
    </div>
  </div>
</section>

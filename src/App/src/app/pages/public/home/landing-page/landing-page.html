<main class="shell">
  <section class="hero-stage" aria-label="Battle Ops hero stage">
    <div class="hero-stage__radar" aria-hidden="true">
      <bat-landing-radar [contacts]="radarContacts()" />
    </div>

    <div class="hero-stage__jumbo">
      <bat-landing-hero
        [audioInstruction]="audioInstruction()"
        [gaugeReadouts]="gaugeReadouts()"
        [terminalFeed]="terminalFeed()"
      />
    </div>
  </section>

  <section class="content-stack" aria-label="Landing page information panels">
    <div class="content-row">
      <bat-landing-doctrine [strategies]="defenseStrategies" />
    </div>

    <div class="content-row">
      <bat-landing-mission [missionHighlights]="missionHighlights" />
    </div>
  </section>
</main>
